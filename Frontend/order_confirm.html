<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單確認</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-cream);
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', Arial, sans-serif;
        }
        .order-confirm-container {
            max-width: 420px;
            margin: 60px auto 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 36px 32px 28px 32px;
            text-align: center;
        }
        .order-confirm-container h1 {
            color: #1e7e34;
            font-size: 2.1rem;
            margin-bottom: 18px;
            letter-spacing: 2px;
        }
        #order-id {
            font-weight: bold;
            font-size: 1.2rem;
        }
        #order-info {
            margin: 22px 0 18px 0;
            text-align: left;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px 18px;
            font-size: 1.05rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="order-confirm-container">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none" style="margin-bottom: 18px;">
            <circle cx="30" cy="30" r="30" fill="#e9fbe5"/>
            <path d="M18 32l8 8 16-16" stroke="#1e7e34" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>訂單已確認！</h1>
        <p style="margin-bottom: 0.5em;">您的訂單編號：<span id="order-id"></span></p>
        <div id="order-info"></div>
        <a href="/assets/index.html" class="btn btn-danger" style="font-weight:500; letter-spacing:1px;">返回首頁</a>
    </div>
    <script src="/assets/js/order_confirm.js"></script>
</body>
</html>
